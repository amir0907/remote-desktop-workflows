name: اجرای g2ray و دریافت کانفیگ با تأخیر (توکن مستقیم امن)

on:
  workflow_dispatch:
    inputs:
      retention_minutes:
        description: 'چند دقیقه پس از دریافت کانفیگ، Codespace فعال بماند؟'
        required: true
        default: '20'
        type: number

jobs:
  run-in-g2ray:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: نصب GitHub CLI
        run: |
          type -p gh || (sudo apt-get update && sudo apt-get install -y gh)

      - name: تنظیم توکن و تست احراز هویت
        env:
          # 👇 توکن خود را دقیقاً اینجا قرار دهید (فقط در مخزن خصوصی)
          GH_TOKEN: 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
        run: |
          if [ -z "$GH_TOKEN" ] || [ "$GH_TOKEN" = "ghp_XXXXXXXXXXXXXXXXXXXXXXXXXXXX" ]; then
            echo "❌ توکن خالی یا همچنان مقدار پیش‌فرض است. لطفاً آن را جایگزین کنید."
            exit 1
          fi
          echo "توکن تنظیم شد (طول: ${#GH_TOKEN})"
          USER=$(gh api user --jq '.login' 2>&1) || {
            echo "❌ احراز هویت شکست خورد. لطفاً موارد زیر را بررسی کنید:"
            echo "  - توکن دقیقاً از صفحه تنظیمات گیت‌هاب کپی شده باشد (بدون فاصله اضافه)"
            echo "  - توکن از نوع classic و دارای مجوزهای repo و codespace باشد"
            echo "  - توکن منقضی نشده باشد"
            echo "خطای دریافتی: $USER"
            exit 1
          }
          echo "✅ احراز هویت موفق. ورود به عنوان: $USER"

      - name: ساخت Codespace روی پروژه اصلی g2ray
        id: create
        run: |
          REPO="edrisranjbar/g2ray"
          echo "استفاده از مخزن: $REPO"
          CS_NAME="g2ray-run-$(date +%s)"
          gh codespace create \
            --repo "$REPO" \
            --branch main \
            --machine basicLinux32gb \
            --codespace-name "$CS_NAME" \
            --json name,state -q '.name' > cs_name.txt
          echo "codespace=$(cat cs_name.txt)" >> $GITHUB_OUTPUT
          echo "منتظر آماده شدن Codespace (حدود ۲ تا ۵ دقیقه)..."
          gh codespace wait -c "$(cat cs_name.txt)" --timeout 10m

      - name: اجرای پروژه و ضبط خروجی
        id: execute
        run: |
          CS_NAME="${{ steps.create.outputs.codespace }}"
          echo "در حال ضبط لاگ‌های Codespace $CS_NAME ..."
          LOG_FILE="/tmp/g2ray-output.log"
          gh codespace ssh -c "$CS_NAME" -- "bash /workspaces/g2ray/.devcontainer/install.sh > $LOG_FILE 2>&1"
          sleep 10
          gh codespace cp -c "$CS_NAME" remote:"$LOG_FILE" terminal-output.txt
          echo "✅ خروجی پروژه دریافت شد:"
          cat terminal-output.txt

      - name: آپلود خروجی به عنوان Artifact
        uses: actions/upload-artifact@v4
        with:
          name: g2ray-vless-config-link
          path: terminal-output.txt

      - name: تأخیر پیش از حذف Codespace
        run: |
          DELAY_MINUTES=${{ github.event.inputs.retention_minutes }}
          echo "⏳ Codespace برای $DELAY_MINUTES دقیقه دیگر فعال می‌ماند..."
          sleep $(( DELAY_MINUTES * 60 ))
          echo "زمان تأخیر به پایان رسید."

      - name: حذف Codespace
        if: always()
        run: |
          CS_NAME="${{ steps.create.outputs.codespace }}"
          echo "حذف Codespace $CS_NAME ..."
          gh codespace delete -c "$CS_NAME" --force || true
