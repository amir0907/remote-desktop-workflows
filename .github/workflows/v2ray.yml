name: اجرای g2ray و دریافت کانفیگ با تأخیر (رفع ارور Fork - پشتیبان خودکار)

on:
  workflow_dispatch:
    inputs:
      retention_minutes:
        description: 'چند دقیقه پس از دریافت کانفیگ، Codespace فعال بماند؟'
        required: true
        default: '20'
        type: number

jobs:
  run-in-g2ray:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # ارتقاء دسترسی GITHUB_TOKEN برای پشتیبانی (در صورت نیاز)
    permissions:
      contents: read
      codespaces: write

    steps:
      - name: نصب GitHub CLI
        run: |
          type -p gh || (sudo apt-get update && sudo apt-get install -y gh)

      - name: احراز هویت و تست دسترسی (انعطاف‌پذیر)
        env:
          # تلاش برای گرفتن توکن شخصی از Secret (مثل فایل متنی امن)
          CUSTOM_TOKEN: ${{ secrets.G2RAY_TOKEN }}
        run: |
          # ❗️ دیگر GITHUB_TOKEN را حذف نمی‌کنیم تا همیشه یک پشتیبان وجود داشته باشد.
          # اولویت با توکن شخصی است، در غیر این صورت از توکن خودکار استفاده می‌کنیم.
          
          if [ -n "$CUSTOM_TOKEN" ]; then
            echo "✅ توکن شخصی از Secret دریافت شد (طول: ${#CUSTOM_TOKEN})"
            # لاگین با توکن شخصی
            echo "$CUSTOM_TOKEN" | gh auth login --with-token
          else
            echo "⚠️ توکن شخصی (G2RAY_TOKEN) در Secret یافت نشد! در حال استفاده از GITHUB_TOKEN خودکار."
            echo "⚠️ توجه: در این حالت فقط می‌توانید در همین مخزن Codespace بسازید، نه در ara0907/g2ray."
            # با GITHUB_TOKEN خودکار که در محیط هست کار می‌کنیم.
            # gh از GITHUB_TOKEN استفاده خواهد کرد.
          fi

          # تست کاربر لاگین شده
          USER=$(gh api user --jq '.login') || {
            echo "❌ احراز هویت شکست خورد. لطفاً مطمئن شوید که Secret با نام دقیق G2RAY_TOKEN ایجاد شده است."
            exit 1
          }
          echo "👤 ورود موفق به عنوان: $USER"

          # تست دسترسی به مخزن اصلی (فقط در صورت استفاده از توکن شخصی معنا دارد)
          if [ -n "$CUSTOM_TOKEN" ]; then
            echo "🔍 بررسی دسترسی به ara0907/g2ray با توکن شخصی..."
            if gh api repos/ara0907/g2ray --jq '.full_name' > /dev/null 2>&1; then
              echo "✅ دسترسی به ara0907/g2ray تأیید شد."
            else
              echo "❌ توکن شخصی شما به ara0907/g2ray دسترسی ندارد! مطمئن شوید PAT دارای مجوز repo باشد."
              exit 1
            fi
          else
            echo "ℹ️ با توکن خودکار، فقط دسترسی به همین مخزن بررسی می‌شود."
            gh api repos/${{ github.repository }} --jq '.full_name' > /dev/null || {
              echo "❌ حتی GITHUB_TOKEN هم کار نمی‌کند."
              exit 1
            }
          fi

          # تست مجوز ساخت Codespace
          echo "🔍 بررسی مجوز ساخت Codespace..."
          gh api user/codespaces --jq '.total_count' > /dev/null 2>&1 || {
            echo "❌ توکن فعلی مجوز 'codespace' را ندارد."
            exit 1
          }
          echo "🎉 تمام بررسی‌ها با موفقیت گذرانده شد."

      - name: ساخت Codespace روی پروژه ara0907/g2ray
        id: create
        run: |
          # دیگر unset نمی‌کنیم، اما اطمینان داریم با توکن مناسب وارد شده‌ایم.
          REPO="ara0907/g2ray"
          CS_NAME="g2ray-run-$(date +%s)"
          echo "📦 ساخت Codespace در مخزن $REPO ..."
          gh codespace create \
            --repo "$REPO" \
            --branch main \
            --machine basicLinux32gb \
            --codespace-name "$CS_NAME" \
            --json name -q '.name' > cs_name.txt
          CS_NAME_CREATED=$(cat cs_name.txt)
          echo "codespace=$CS_NAME_CREATED" >> $GITHUB_OUTPUT
          echo "⏳ منتظر آماده شدن Codespace (حدود ۲ تا ۵ دقیقه)..."
          gh codespace wait -c "$CS_NAME_CREATED" --timeout 10m
          echo "✅ Codespace با نام $CS_NAME_CREATED آماده است."

      - name: اجرای پروژه و ضبط خروجی
        id: execute
        run: |
          exec > >(tee -a /tmp/workflow-activity.log) 2>&1
          
          CS_NAME="${{ steps.create.outputs.codespace }}"
          REMOTE_LOG="/tmp/g2ray-output.log"
          LOCAL_OUTPUT="terminal-output.txt"

          echo "🚀 در حال اجرای اسکریپت نصب در Codespace $CS_NAME ..."
          gh codespace ssh -c "$CS_NAME" -- "bash /workspaces/g2ray/.devcontainer/install.sh > $REMOTE_LOG 2>&1"
          sleep 10

          echo "📥 در حال دریافت فایل خروجی از Codespace..."
          gh codespace cp -c "$CS_NAME" remote:"$REMOTE_LOG" "$LOCAL_OUTPUT"
          echo "📄 خروجی پروژه (terminal-output.txt):"
          cat "$LOCAL_OUTPUT"
          echo "✅ عملیات اجرا و دریافت خروجی به پایان رسید."

      - name: آپلود خروجی اصلی پروژه (کانفیگ)
        uses: actions/upload-artifact@v4
        with:
          name: g2ray-vless-config-link
          path: terminal-output.txt

      - name: آپلود لاگ فعالیت workflow
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-full-log
          path: /tmp/workflow-activity.log

      - name: تأخیر پیش از حذف Codespace
        if: always()
        run: |
          exec > >(tee -a /tmp/workflow-activity.log) 2>&1
          DELAY_MINUTES=${{ github.event.inputs.retention_minutes }}
          echo "⏳ Codespace برای $DELAY_MINUTES دقیقه دیگر فعال می‌ماند..."
          sleep $(( DELAY_MINUTES * 60 ))
          echo "زمان تأخیر به پایان رسید."

      - name: حذف Codespace
        if: always()
        run: |
          exec > >(tee -a /tmp/workflow-activity.log) 2>&1
          CS_NAME="${{ steps.create.outputs.codespace }}"
          echo "🗑️ حذف Codespace $CS_NAME ..."
          gh codespace delete -c "$CS_NAME" --force || true
